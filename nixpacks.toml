# nixpacks.toml
# Tells Railway's Nixpacks builder which Python version and packages to use.
# Without this, Railway sometimes picks Python 3.10 which misses some features.

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
